<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>KOVA OS — Redirecting...</title>
    <meta name="description" content="KOVA — Katy's Organizational Voice Assistant. Your life. Sorted." />
    <meta http-equiv="refresh" content="2;url=https://kova.manus.space" />
    <link rel="canonical" href="https://kova.manus.space" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        gap: 1.5rem;
      }
      .orb {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #fff 0%, rgba(255,255,255,0.3) 20%, transparent 60%),
                    conic-gradient(from 0deg, #00cfff, #ff00cc, #ff8800, #00ff88, #00cfff);
        animation: spin 3s linear infinite, pulse 2s ease-in-out infinite alternate;
        filter: blur(0.5px);
        box-shadow: 0 0 60px rgba(0,207,255,0.4), 0 0 120px rgba(255,0,204,0.2);
      }
      @keyframes spin { to { filter: hue-rotate(360deg) blur(0.5px); } }
      @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }
      h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; }
      p { color: rgba(255,255,255,0.6); font-size: 1rem; }
      .dots { display: flex; gap: 6px; }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: rgba(255,255,255,0.4);
        animation: blink 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }
      a { color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none; }
      a:hover { color: #fff; }
    </style>
  </head>
  <body>
    <div class="orb"></div>
    <h1>KOVA OS</h1>
    <p>Your life. Sorted.</p>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <p>Redirecting to the app...</p>
    <a href="https://kova.manus.space">Go now →</a>
    <script>
      setTimeout(() => { window.location.href = 'https://kova.manus.space'; }, 2000);
    </script>
  </body>
</html>
